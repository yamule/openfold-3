    template_structure_array_directory: /shared/openfold3/pdb_training_set/templates/template_structure_arrays
    template_structures_directory: null
    template_file_format: npz
    ccd_file: null
    use_roda_monomer_format: true

  disordered-pdb:
    alignments_directory: none
    alignment_db_directory: none
    alignment_array_directory: /shared/openfold3/pdb_training_set/alignment_arrays
    dataset_cache_file: /shared/openfold3/pdb_training_set/dataset_caches/disordered_cache_with_templates.json
    target_structures_directory: /shared/openfold3/pdb_training_set/preprocessed_pdb_data/disordered/structure_files
    target_structure_file_format: npz
