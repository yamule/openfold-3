experiment_settings:
  mode: train
  output_dir: ./test_train_output
  restart_checkpoint_path: last

data_module_args:
  batch_size: 1
  num_workers: 16
  epoch_len: 128000 # Ckpt every 500 steps

logging_config:
  log_lr : true 
  wandb_config:
    project: <project_name>
    entity: <entity_name> 
    group: null
    id: null
    experiment_name: <experiment_name> 

pl_trainer_args:
  devices: 8
  num_nodes: 32
  precision: bf16-mixed
  max_epochs: -1
  log_every_n_steps: 50
  
  mpi_plugin: false
  deepspeed_config_path: null

# Checkpoint settings
checkpoint_config:
  every_n_epochs: 1
  auto_insert_metric_name: false
  save_last: true
  save_top_k: -1

model_update:
  presets: 
    - train 
  custom:
    settings:
      model_selection_weight_scheme: fine_tuning
      memory:
        train:
          msa_module:
            swiglu_seq_chunk_size: 1024
    architecture:
      shared:
        use_confidence_emb_prob: 0.8
        diffusion:
          no_samples: 32
          use_conditioning_prob: 0.8
      loss_module:
        diffusion:
          chunk_size: 2

dataset_configs:
  train:
    weighted-pdb:
      dataset_class: WeightedPDBDataset
      weight: 0.5
      config:
        debug_mode: true
        template:
          n_templates: 4
          take_top_k: false
        crop:
          token_crop:
            enabled: true
            token_budget: 768
            crop_weights:
              contiguous: 0.2
              spatial: 0.4
              spatial_interface: 0.4
          chain_crop:
            enabled: true
        loss:
          loss_weights:
            bond: 4.0
            smooth_lddt: 0.0

    long-monomer-distillation:
      dataset_class: ProteinMonomerDataset
      weight: 0.495
      config:
        debug_mode: true
        template:
          n_templates: 4
          take_top_k: false
        sample_in_order: true
        crop:
          token_crop:
            enabled: true
            token_budget: 768 
            crop_weights:
              contiguous: 0.25
              spatial: 0.75
              spatial_interface: 0.0
        loss:
          loss_weights:
            bond: 4.0
            smooth_lddt: 0.0
            experimentally_resolved: 0.0
            plddt: 0.0
            pae: 0.0
            pde: 0.0

    short-monomer-distillation:
      dataset_class: ProteinMonomerDataset
      weight: 0.005
      config:
        debug_mode: true
        template:
          n_templates: 4
          take_top_k: false
        sample_in_order: true
        crop:
          token_crop:
            enabled: true
            token_budget: 768 
            crop_weights:
              contiguous: 0.25
              spatial: 0.75
              spatial_interface: 0.0
        loss:
          loss_weights:
            bond: 4.0
            smooth_lddt: 0.0
            experimentally_resolved: 0.0
            plddt: 0.0
            pae: 0.0
            pde: 0.0

    disordered-pdb:
      dataset_class: DisorderedPDBDataset
      weight: 0.02  # reset weight to initial training level
      config:
        debug_mode: true
        template:
          n_templates: 4
          take_top_k: false
        disable_non_protein_diffusion_weights: false  # set to F in fine tuning
        crop:
          token_crop:
            enabled: true
            token_budget: 768
            crop_weights:
              contiguous: 0.2
              spatial: 0.4
              spatial_interface: 0.4
          chain_crop:
            enabled: true
        loss:
          loss_weights:
            bond: 4.0
            smooth_lddt: 0.0
            experimentally_resolved: 0.0
            plddt: 0.0
            pae: 0.0
            pde: 0.0

    RNA-monomer-distillation:
      dataset_class: RNAMonomerDataset
      weight: 0.05
      config:
        debug_mode: true
        crop:
          token_crop:
            enabled: true
            token_budget: 768
            crop_weights:
              contiguous: 0.25
              spatial: 0.75
              spatial_interface: 0.0
        loss:
          loss_weights:
            bond: 4.0
            smooth_lddt: 0.0
            experimentally_resolved: 0.0
            plddt: 0.0
            pae: 0.0
            pde: 0.0

  validation:
    val-weighted-pdb:
      dataset_class: ValidationPDBDataset
      config:
        debug_mode: true
        msa:
          subsample_main: false
        template:
          n_templates: 4
          take_top_k: true
        crop:
          token_crop:
            enabled: false

dataset_paths:
  weighted-pdb:
    alignments_directory: none
    alignment_db_directory: none
    alignment_array_directory: /shared/openfold3/pdb_training_set/alignment_arrays
    dataset_cache_file: /shared/openfold3/pdb_training_set/dataset_caches/training_cache_with_templates.json
    target_structures_directory: /shared/openfold3/pdb_training_set/preprocessed_pdb_data/standard/structure_files
    target_structure_file_format: npz
    reference_molecule_directory: /shared/openfold3/pdb_training_set/preprocessed_pdb_data/standard/reference_mols
    template_cache_directory: /shared/openfold3/pdb_training_set/templates/train_template_cache
